  Boot: QK_BOOT
  DebugToggle: DB_TOGG
  ClearEEPROM: EE_CLR
  AutoShiftToggle: AS_TOGG
  AutoShiftDown: AS_DOWN
  AutoShiftUp: AS_UP
  AutoShiftReport: AS_RPT
