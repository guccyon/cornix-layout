  # ===================================
  # Layer Switching
  # ===================================
  # Note: Layer switching requires parameters, so these are templates
  # Actual usage: MO(0), DF(1), TG(2), etc.
  # MO(layer): Momentary layer switch
  # DF(layer): Default layer
  # TG(layer): Toggle layer
  # TO(layer): To layer (exclusive)
  # TT(layer): Tap toggle
  # OSL(layer): One shot layer
  # LT(layer, kc): Layer tap

  # ===================================
  # Mod-Tap Keys
  # ===================================
  # Note: Mod-Tap requires parameters, so these are templates
  # LCTL_T(kc): Left Control when held, kc when tapped
  # LSFT_T(kc): Left Shift when held, kc when tapped
  # LALT_T(kc): Left Alt when held, kc when tapped
  # LGUI_T(kc): Left GUI when held, kc when tapped
  # RCTL_T(kc): Right Control when held, kc when tapped
  # RSFT_T(kc): Right Shift when held, kc when tapped
  # RALT_T(kc): Right Alt when held, kc when tapped
  # RGUI_T(kc): Right GUI when held, kc when tapped
  # MT(mod, kc): Generic mod-tap

  # ===================================
  # One Shot Modifiers
  # ===================================
  # Note: One Shot Modifiers require parameters
  # OSM(MOD_LCTL): One shot left control
  # OSM(MOD_LSFT): One shot left shift
  # OSM(MOD_LALT): One shot left alt
  # OSM(MOD_LGUI): One shot left GUI
  # OSM(MOD_RCTL): One shot right control
  # OSM(MOD_RSFT): One shot right shift
  # OSM(MOD_RALT): One shot right alt
  # OSM(MOD_RGUI): One shot right GUI

  # ===================================
  # Modifier Combinations
  # ===================================
  # Note: Modifier combinations require parameters
  # C(kc): Control + kc
  # S(kc): Shift + kc
  # A(kc): Alt + kc
  # G(kc): GUI + kc
  # HYPR(kc): Ctrl+Shift+Alt+GUI + kc
  # MEH(kc): Ctrl+Shift+Alt + kc

  # ===================================
  # Backlight and RGB
  # ===================================
  BLOn: BL_ON
  BLOff: BL_OFF
  BLToggle: BL_TOGG
  BLStep: BL_STEP
  BLIncrease: BL_INC
  BLDecrease: BL_DEC
  BLBreathe: BL_BRTG
  RGBToggle: RGB_TOG
  RGBModeForward: RGB_MOD
  RGBModeReverse: RGB_RMOD
  RGBHueIncrease: RGB_HUI
  RGBHueDecrease: RGB_HUD
  RGBSatIncrease: RGB_SAI
  RGBSatDecrease: RGB_SAD
  RGBValIncrease: RGB_VAI
  RGBValDecrease: RGB_VAD

  # ===================================
